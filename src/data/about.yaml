label: "01 // HAKKIMDA"
heading: "İnşaat ve yazılım dünyasını birleştiriyorum"

paragraphs:
  - 'iOS Developer ve BIM Uzmanı olarak <strong class="text-ink">Ankara</strong> merkezli çalışıyorum. SwiftUI ile modern mobil uygulamalar geliştirirken inşaat sektöründeki teknik birikimimi yazılım projelerime yansıtıyorum.'
  - 'Geliştirdiğim uygulamalar arasında bebek takip uygulaması <strong class="text-ink">Lilio</strong>, konum takip uygulaması <strong class="text-ink">GPS Tracker  </strong>, İslami yaşam asistanı <strong class="text-ink">Hidayet</strong> ve kişisel finans uygulaması <strong class="text-ink">Ledgerly</strong> yer alıyor.'
  - 'iOS geliştirme deneyimlerimi <a href="/blog" class="font-medium">blogumda</a> paylaşıyor, Türkçe konuşan geliştirici topluluğuna katkı sağlamaya çalışıyorum.'

